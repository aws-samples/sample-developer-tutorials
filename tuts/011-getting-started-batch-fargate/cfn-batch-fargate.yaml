AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Batch on Fargate - compute environment and job queue.

Resources:
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  ComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: FARGATE
        MaxvCpus: 4
        Subnets:
          - !Select [0, !Split [',', !ImportValue tutorial-prereqs-vpc-public-PrivateSubnets]]
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
      ServiceRole: !GetAtt BatchServiceRole.Arn

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Batch Fargate compute environment
      VpcId: !ImportValue tutorial-prereqs-vpc-public-VpcId

  JobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironment

Outputs:
  ComputeEnvironmentArn:
    Value: !Ref ComputeEnvironment
  JobQueueArn:
    Value: !Ref JobQueue
