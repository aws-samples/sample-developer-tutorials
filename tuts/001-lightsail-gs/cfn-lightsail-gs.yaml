AWSTemplateFormatVersion: '2010-09-09'
Description: Lightsail getting started - instance with attached disk.

Resources:
  Instance:
    Type: AWS::Lightsail::Instance
    Properties:
      InstanceName: !Sub '${AWS::StackName}-instance'
      BlueprintId: amazon_linux_2023
      BundleId: nano_3_2
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: tutorial
          Value: !Ref AWS::StackName

  Disk:
    Type: AWS::Lightsail::Disk
    Properties:
      DiskName: !Sub '${AWS::StackName}-disk'
      SizeInGb: 8
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: tutorial
          Value: !Ref AWS::StackName

Outputs:
  InstanceName:
    Value: !Ref Instance
  DiskName:
    Value: !Ref Disk
