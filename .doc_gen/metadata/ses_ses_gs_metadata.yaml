          excerpts:
            - description:
              snippet_files:
                - tuts/033-ses-gs/ses-gs.sh
  services:
    ses: {DeleteIdentity, GetIdentityVerificationAttributes, GetSendQuota, ListIdentities, SendEmail, VerifyDomainDkim, VerifyDomainIdentity, VerifyEmailIdentity}
